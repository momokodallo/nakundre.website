<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    color: white;
    overflow: hidden;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

h1 {
    font-size: 60px;
}

p {
    font-size: 22px;
    max-width: 600px;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

#msg {
    display: none;
    margin-top: 20px;
    font-size: 22px;
}

.balloon {
    position: absolute;
    bottom: -150px;
    width: 50px;
    animation: float 8s infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<img class="balloon" style="left:10%;" src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png">
<img class="balloon" style="left:80%; animation-delay:2s;" src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png">

<div class="hero">
    <h1>🎉 Happy Birthday! 🎂</h1>

    <p>
        Wishing you happiness, love, and success always ❤️
    </p>

    <button onclick="showMsg()">Open Surprise 🎁</button>

    <div id="msg">
        💖 You are an amazing friend! Happy Birthday! 🎉
    </div>
</div>

<script>
function showMsg() {
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
