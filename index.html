<!DOCTYPE html>
<html>
<body style="text-align:center; font-family:Arial;">

<h2>🎁 Surprise Button Test</h2>

<button onclick="showMsg()">Open Surprise 🎉</button>

<div id="msg" style="display:none; margin-top:20px; font-size:20px;">
💖 It works now!
</div>

<script>
function showMsg() {
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
